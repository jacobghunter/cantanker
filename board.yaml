units:
  kx: cx
  ky: cy
  px: kx + 4
  py: ky + 4
points:
  mirror: &mirror
    ref: matrix_inner_num
    distance: 8kx
  zones:
    matrix:
      anchor: {shift: [40, -150]}
      key:
        padding: 1ky
        spread: 1kx
      columns:
        outer:
          rows.mod.skip: true
          rows.num.asym: source
          key:
            nets: {from: P10}
            tags: [switch, key]
        pinky:
          key:
            stagger: 6
            splay: -5
            nets: {from: P19}
            tags: [switch, key]
          rows.mod.skip: true
        ring:
          key:
            splay: -3
            stagger: 7
            nets: {from: P9}
            tags: [switch, key]
          rows.mod.skip: true
        middle:
          key:
            stagger: 2.5
            nets: {from: P0}
            tags: [switch, key]
        index: 
          key:
            stagger: -2.5
            nets: {from: P14}
            tags: [switch, key] 
          rows.mod.skip: true
        inner:
          rows.mod.skip: true
          key:
            stagger: -2.5
            nets: {from: P15}
            tags: [switch, key] 
      rows:
        mod: {nets: {to: P8}}
        bottom: {nets: {to: P7}}
        home: {nets: {to: P6}}
        top: {nets: {to: P5}}
        num: {nets: {to: P4}}
    thumbs:
      key:
        padding: 1ky
        spread: 1kx
      columns:
        layer:
          key:
            splay: -30
            shift: [0, -6]
            nets: {from: P16}
            tags: [switch, key]
        # CONSIDER ADDING THE NAV KEY BACK
        # nav:
        #   key:
        #     splay: -35
        #     shift: [7.8, -4.8]
        #     nets: {from: P1}
        #     tags: [switch, key] 
        space:
          key:
            width: 1.5kx
            splay: 60
            shift: [-2,-8]
            nets: {from: P18}
            tags: [switch, key, key_5u]
      anchor:
        ref: matrix_inner_mod
        shift: [2, -2]
      rows:
        cluster: {nets: {to: P8}}

    matrix_index_mod_key:
      anchor:
        ref: matrix_index_bottom
        shift: [0, -1kx]
      key:
        rotate: -20
        shift: [0, -0.5]
        nets: {from: P14, to: P8}
        tags: [switch, key]

    right_encoder:
      anchor: {ref: matrix_outer_num}
      key:
        asym: clone
        padding: 1ky
        spread: 1kx
        footprint: Rotary
        rotate: 90
        nets: {a: P20, b: P101, from: P21, to: GND}
        tags: [encoder, key] 

    left_encoder:
      anchor: {ref: matrix_inner_bottom}
      key:
        asym: source
        shift: [20, 5]
        padding: 1ky
        spread: 1kx
        footprint: Rotary
        nets: {a: P20, b: P101, from: P21, to: GND}
        tags: [encoder, key]

    mcu:
      anchor: {ref: matrix_inner_num, shift: [20, 0]}
      key:
        shift: [0, -4]
        footprint: nice!nano_v2
        tags: [mcu]
      
    left_power_sw:
      anchor: {ref: mcu, shift: [10, -58]}
      key:
        asym: source
        footprint: Power_Switch_MSK12C02
        tags: [power_l] 
    
    right_power_sw:
      anchor: {ref: mcu, shift: [10, -58]}
      key:
        asym: clone
        rotate: 180
        footprint: Power_Switch_MSK12C02
        tags: [power_r] 
    
    trackpad_socket:
      anchor: {ref: matrix_inner_bottom, shift: [20, 13]}
      key:
        asym: clone
        footprint: nice!nano_v2
        nets: {vcc: VCC, gnd: GND, sda: P2, scl: P3, rdy: P102}
        tags: [trackpad, key] 

outlines:
  _switch_cutouts:
    - what: rectangle
      fillet: 2
      where: "/switch/"
      size: [13.8, 13.8]

  _encoder_cutouts:
    - what: circle
      where: /encoder/
      radius: 8

  _trackpad_cutout:
    - what: rectangle
      where: /trackpad/
      size: [43.2, 40.2]
      fillet: 2
      adjust:
        shift: [10, 0]

  hull:
    - what: hull
      concavity: 60
      fillet: 4
      points: 
        - ref: matrix_outer_num
        - ref: matrix_pinky_num
        - ref: matrix_ring_num
        - ref: matrix_middle_num
        - ref: matrix_index_num
        - ref: mcu
        - ref: thumbs_space_cluster
        # - ref: thumbs_nav_cluster
        - ref: thumbs_layer_cluster
        - ref: matrix_index_mod_key
        - ref: matrix_middle_mod
        - ref: matrix_ring_bottom
        - ref: matrix_outer_bottom
    - what: hull
      concavity: 60
      fillet: 4
      points: 
        - ref: mirror_right_encoder
        - ref: mirror_matrix_pinky_num
        - ref: mirror_matrix_ring_num
        - ref: mirror_matrix_middle_num
        - ref: mirror_matrix_index_num
        - ref: mirror_mcu
        - ref: mirror_thumbs_space_cluster
        # - ref: mirror_thumbs_nav_cluster
        - ref: mirror_thumbs_layer_cluster
        - ref: mirror_matrix_index_mod_key
        - ref: mirror_matrix_middle_mod
        - ref: mirror_matrix_ring_bottom
        - ref: mirror_matrix_outer_bottom

  _board:
    - what: polygon
      operation: stack
      fillet: 2
      points: 
        - ref: matrix_outer_num
          shift: [-0.5px,0.5py]
        - ref: matrix_pinky_num
          shift: [-0.5px,0.5py]
        - ref: matrix_ring_num
          shift: [-0.5px,0.5py]
        - ref: matrix_middle_num
          shift: [-0.5px,0.5py]
        - ref: matrix_middle_num
          shift: [0.5px,0.5py]
        - ref: matrix_index_num
          shift: [0.5px,0.5py]
        - ref: mcu
          shift: [-0.5px,0.8py]
        - ref: mcu
          shift: [0.5px,0.8py]
        - ref: left_power_sw
          shift: [0.08px,-0.2py]
        # - ref: thumbs_space_cluster
        #   shift: [0.75px,0.55py]
        - ref: thumbs_space_cluster
          shift: [0.75px,-0.55py]
        - ref: thumbs_space_cluster
          shift: [-0.75px,-0.55py]
        # - ref: thumbs_nav_cluster
        #   shift: [0,-0.5py]
        - ref: thumbs_layer_cluster
          shift: [0, -0.5py]
        - ref: matrix_index_mod_key
          shift: [-0.5px,-0.5py]
        - ref: matrix_middle_mod
          shift: [-0.5px,-0.5py]
        - ref: matrix_ring_bottom
          shift: [0,-1.2py]
        - ref: matrix_outer_bottom
          shift: [0.5px,-0.55py]
        - ref: matrix_outer_bottom
          shift: [-0.55px,-0.55py]
    - what: polygon
      operation: stack
      fillet: 4
      points: 
        - ref: mirror_right_encoder
          shift: [0.5px,0.5py]
        - ref: mirror_matrix_pinky_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_ring_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_middle_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_middle_num
          shift: [0.5px,0.5py]
        - ref: mirror_matrix_index_num
          shift: [0.5px,0.5py]
        - ref: mirror_mcu
          shift: [-0.5px,0.8py]
        - ref: mirror_mcu
          shift: [0.5px,0.8py]
        - ref: mirror_right_power_sw
          shift: [-0.08px,0.2py]
        # - ref: mirror_thumbs_space_cluster
        #   shift: [0.75px,0.55py]
        - ref: mirror_thumbs_space_cluster
          shift: [0.75px,-0.55py]
        - ref: mirror_thumbs_space_cluster
          shift: [-0.75px,-0.55py]
        # - ref: mirror_thumbs_nav_cluster
        #   shift: [0,-0.5py]
        - ref: mirror_thumbs_layer_cluster
          shift: [0, -0.5py]
        - ref: mirror_matrix_index_mod_key
          shift: [-0.5px,-0.5py]
        - ref: mirror_matrix_middle_mod
          shift: [-0.5px,-0.5py]
        - ref: mirror_matrix_ring_bottom
          shift: [0,-1.2py]
        - ref: mirror_matrix_outer_bottom
          shift: [0.5px,-0.55py]
        - ref: mirror_matrix_outer_bottom
          shift: [-0.55px,-0.55py]

  _mcu:
    - what: rectangle
      where: /mcu/
      size: [17.78,33]
      fillet: 1
    - what: rectangle
      where: /mcu/
      size: [8.94,7.35]
      fillet: 0.1
      operation: stack
      adjust:
        shift: [0,33/2-7.35/2+0.7]
  
  _power_switch:
    - what: rectangle
      where: /power/
      size: [2, 6]

  _thumb_keys:
    - what: rectangle
      where: /key_5u/
      size: [18*1.5,18]
      fillet: 1.5
      operation: stack

  default:
    - name: _board
    - name: _switch_cutouts
      operation: subtract
    - name: _encoder_cutouts
      operation: subtract
    - name: _trackpad_cutout
      operation: subtract
    - name: _mcu
      operation: subtract
    - name: _power_switch
      operation: subtract
    - name: _thumb_keys
      operation: subtract
    

pcbs:
  _board:
    template: kicad8
    outlines: 
      main.outline: _board
    footprints:
      mcu:
        what: ceoloide/mcu_supermini_nrf52840
        where: /mcu/ 
        params:
          VCC: "{{nets.VCC}}"
          GND: "{{nets.GND}}"
          
      power_switch_left:
        what: ceoloide/power_switch_smd_side
        where: /power_l/
        params:
          reversible: true
          side: B
      
      power_switch_right:
        what: ceoloide/power_switch_smd_side
        where: /power_r/
        params:
          reversible: true
          side: B
        
      encoders:
        what: ceoloide/rotary_encoder_ec11_ec12
        where: /encoder/

      switches:
        what: ceoloide/switch_choc_v1_v2
        where: /switch/
        params:
          hotswap: true
          from: "{{column_net}}"
          to: "{{row_net}}"

      # trackpad:
      #   what: infused-kim/pads
      #   where: /trackpad/
      #   params:
      #     side: F
      #     pads: 5
      #     net_1: "{{nets.vcc}}"
      #     net_2: "{{nets.gnd}}"
      #     net_3: "{{nets.sda}}"
      #     net_4: "{{nets.scl}}"
      #     net_5: "{{nets.rdy}}"

      trackpad:
        what: ceoloide/mcu_supermini_nrf52840
        where: /trackpad/
        params:
          VCC: "{{nets.vcc}}"
          GND: "{{nets.gnd}}"
          P2: "{{nets.sda}}"
          P3: "{{nets.scl}}"
          P102: "{{nets.rdy}}"
