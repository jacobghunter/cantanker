# This is a split wireless corne-like keyboard with an Azoteq TPS43 mounted on the right

units:
  kx: cx
  ky: cy
  px: kx + 4
  py: ky + 4
points:
  mirror: &mirror
    ref: matrix_inner_num
    distance: 6kx
  zones:
    matrix:
      anchor: {shift: [40, -150]}
      key:
        padding: 1ky
        spread: 1kx
        draw:
          - what: rectangle
            size: 18
            fillet: 3
      columns:
        outer:
          rows.mod.skip: true
          rows.num.asym: source
          key:
            column_net: P10
            tags: [switch]
        pinky:
          key:
            stagger: 6
            splay: -5
            column_net: P19
            tags: [switch]
          rows.mod.skip: true
        ring:
          key:
            splay: -3
            stagger: 7
            column_net: P9
            tags: [switch]
          rows.mod.skip: true
        middle:
          key:
            stagger: 2.5
            column_net: P0
            tags: [switch]
          rows.mod.skip: true
        index: 
          key:
            stagger: -2.5
            column_net: P14
            tags: [switch] 
          rows.mod.skip: true
        inner:
          rows.mod.skip: true
          key:
            stagger: -2.5
            column_net: P15
            tags: [switch] 
      rows:
        mod.row_net: P8  
        bottom.row_net: P7
        home.row_net: P6 
        top.row_net: P5 
        num.row_net: P4
    
    thumbs:
      key:
        padding: 1ky
        spread: 1kx
      columns:
        layer:
          key:
            splay: -35
            shift: [0.35kx, -0.5ky]
            column_net: P16
            tags: [switch]
        space:
          key:
            width: 1.5kx
            splay: 65
            shift: [-0.2kx,-0.9ky]
            column_net: P18
            tags: [switch, key_1.5u]
      anchor:
        ref: matrix_inner_mod
        shift: [2, -2]
      rows:
        cluster: 
          row_net: P8

    matrix_middle_mod_key:
      anchor:
        ref: matrix_middle_bottom
        shift: [-0.02kx, -1.16ky]
      key:
        rotate: -5
        shift: [0, 0]
        column_net: P0
        row_net: P8  
        tags: [switch]

    matrix_index_mod_key:
      anchor:
        ref: matrix_index_bottom
        shift: [0.1kx, -1.2kx]
      key:
        rotate: -20
        shift: [0, -0.5]
        column_net: P14
        row_net: P8  
        tags: [switch]
        
    right_encoder:
      anchor: {ref: matrix_outer_num}
      key:
        asym: clone
        padding: 1ky
        spread: 1kx
        footprint: Rotary
        shift: [0, 0.1kx]
        nets: {a: P20, b: P101, from: P21, to: GND}
        tags: [encoder] 

    left_encoder:
      anchor: {ref: matrix_inner_bottom}
      key:
        asym: source
        shift: [20, 5]
        padding: 1ky
        spread: 1kx
        footprint: Rotary
        nets: {a: P20, b: P101, from: P21, to: GND}
        tags: [encoder]

    mcu:
      anchor: {ref: matrix_inner_num, shift: [20, 0]}
      key:
        shift: [0, -4]
        footprint: nice!nano_v2
        tags: [mcu]
    
    display:
      key:
        asym: source
        tags: [oled]
        height: 36
        width: 14
        nets: {gnd: GND, vcc: VCC, mosi: P1, sck: P2, cs: P3}
      anchor:
        - ref: mcu
          shift: [0,-3.5]

    battery_connector_under:
      anchor:
        - ref: mcu
          shift: [0, 10]
      key: 
        tags: [jst]
        nets: {pos: RAW, neg: GND}

    battery_connector_lower:
      anchor:
        - ref: thumbs_layer_cluster
          shift: [5, 15]
          rotate: 180
      key: 
        tags: [jst]
        nets: {pos: RAW, neg: GND}
      
    left_power_sw:
      anchor: {ref: mcu, shift: [9.5, -68]}
      key:
        asym: source
        footprint: Power_Switch_MSK12C02
        tags: [power_l] 
    
    right_power_sw:
      anchor: {ref: mcu, shift: [9.5, -68]}
      key:
        asym: clone
        rotate: 180
        footprint: Power_Switch_MSK12C02
        tags: [power_r] 
    
    reset_button:
      anchor:
        ref: matrix_inner_num
      key:
        footprint: reset_switch
        tags: [reset_button]
        shift: [0.35kx, 0.625ky]
        rotate: 0

    # Going to use the Azoteq TPS43 with the kit from https://holykeebs.com/products/touchpad-module
    trackpad_socket:
      anchor: {ref: matrix_inner_bottom, shift: [20, 6]}
      key:
        asym: clone
        footprint: nice!nano_v2
        nets: {vcc: VCC, gnd: GND, sda: P2, scl: P3, rdy: P102} # This is now correct
        tags: [trackpad]

    mounting_hole_top_left:
      anchor: 
        ref: matrix_pinky_num
      key:
        tags: [hole]
        shift: [-0.65kx, -0.5ky]
    
    mounting_hole_bottom_left:
      anchor: 
        ref: matrix_ring_mod
      key:
        tags: [hole]
        shift: [0kx, 0.25ky]

    mounting_hole_top_right:
      anchor: 
        ref: mcu
      key:
        tags: [hole]
        shift: [-0.525kx, -1.25ky]

    mounting_hole_bottom_right:
      anchor: 
        ref: matrix_inner_bottom
      key:
        tags: [hole]
        shift: [0kx, -0.8ky]

outlines:
  switch_cutouts:
    - what: rectangle
      fillet: 2
      where: "/switch/"
      size: [13.8, 13.8] 
  
  _key_cutouts:
    - what: rectangle
      fillet: 2
      where: "/switch/"
      size: [kx-0.5, ky-0.5]

  _encoder_cutouts:
    - what: circle
      where: /encoder/
      radius: 8

  _trackpad_cutout:
    - what: rectangle
      where: /trackpad/
      size: [40.2, 43.2]
      fillet: 2
      adjust:
        shift: [11, -5]

  _board:
    - what: polygon
      operation: stack
      fillet: 4
      points: 
        - ref: matrix_outer_num
          shift: [-0.5px,0.5py]
        - ref: matrix_pinky_num
          shift: [-0.5px,0.5py]
        - ref: matrix_ring_num
          shift: [-0.5px,0.5py]
        - ref: matrix_middle_num
          shift: [-0.5px,0.5py]
        - ref: matrix_middle_num
          shift: [0.5px,0.5py]
        - ref: matrix_index_num
          shift: [0.5px,0.5py]
        - ref: mcu
          shift: [-0.5px,0.8py]
        - ref: mcu
          shift: [0.5px,0.8py]
        # - ref: left_power_sw
        #   shift: [0.08px,0.2py]
        - ref: thumbs_space_cluster
          shift: [0.8px,0.5py]
        - ref: thumbs_space_cluster
          shift: [0.75px,-0.55py]
        - ref: thumbs_space_cluster
          shift: [-0.75px,-0.55py]
        - ref: thumbs_layer_cluster
          shift: [0, -0.5py]
        - ref: matrix_index_mod_key
          shift: [-0.5px,-0.55py]
        - ref: matrix_ring_bottom
          shift: [0,-1.2py]
        - ref: matrix_outer_bottom
          shift: [0.5px,-0.55py]
        - ref: matrix_outer_bottom
          shift: [-0.55px,-0.55py]
    - what: polygon
      operation: stack
      fillet: 4
      points: 
        - ref: mirror_right_encoder
          shift: [-0.5px,0.4py]
        - ref: mirror_matrix_pinky_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_ring_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_middle_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_middle_num
          shift: [0.5px,0.5py]
        - ref: mirror_matrix_index_num
          shift: [0.5px,0.5py]
        - ref: mirror_mcu
          shift: [-0.5px,0.8py]
        - ref: mirror_mcu
          shift: [0.5px,0.8py]
        # - ref: mirror_right_power_sw
        #   shift: [-0.08px,-0.2py]
        - ref: mirror_thumbs_space_cluster
          shift: [0.8px,0.5py]
        - ref: mirror_thumbs_space_cluster
          shift: [0.75px,-0.55py]
        - ref: mirror_thumbs_space_cluster
          shift: [-0.75px,-0.55py]
        - ref: mirror_thumbs_layer_cluster
          shift: [0, -0.5py]
        - ref: mirror_matrix_index_mod_key
          shift: [-0.5px,-0.55py]
        - ref: mirror_matrix_ring_bottom
          shift: [0,-1.2py]
        - ref: mirror_matrix_outer_bottom
          shift: [0.5px,-0.55py]
        - ref: mirror_matrix_outer_bottom
          shift: [-0.55px,-0.55py]

  _mcu:
    - what: rectangle
      where: /mcu/
      size: [17.78,33]
      fillet: 1
    - what: rectangle
      where: /mcu/
      size: [8.94,7.35]
      fillet: 0.1
      operation: stack
      adjust:
        shift: [0,33/2-7.35/2+0.7]

  _display:
    - what: rectangle
      where: /display/
      size: [14,36]
      fillet: 0.5
    - what: rectangle
      where: /display/
      size: [12.82,2.66]
      operation: stack
      fillet: 0.1
      adjust:
        shift: [0,-16.7]
    - what: rectangle
      where: /display/
      size: [10.8,24.6]
      operation: stack
      adjust:
        shift: [0,-0.75]
  
  _power_switch:
    - what: rectangle
      where: /power/
      size: [2, 6]

  _thumb_keys:
    - what: rectangle
      where: /key_1.5u/
      size: [18*1.5,18]
      fillet: 1.5
      operation: stack

  _mounting_holes:
    - what: circle
      where: /hole/
      operation: stack
      radius: 1.1

  default:
    - name: _board
    - name: _key_cutouts
      operation: subtract
    - name: _encoder_cutouts
      operation: subtract
    - name: _trackpad_cutout
      operation: add
    - name: _trackpad_cutout
      operation: subtract
    - name: _mcu
      operation: subtract
    - name: _display
      operation: stack
    - name: _power_switch
      operation: subtract
    - name: _mounting_holes
      operation: subtract
    - name: _thumb_keys
      operation: subtract
    

pcbs:
  board:
    template: kicad8
    outlines: 
      main.outline: _board
    footprints:
      mcu:
        what: ceoloide/mcu_supermini_nrf52840
        where: /mcu/ 
        params:
          # --- POWER ---
          VCC: "{{nets.VCC}}"
          GND: "{{nets.GND}}"
          RAW: "{{nets.RAW}}"

          # --- ROWS ---
          P8: "P8"
          P7: "P7"
          P6: "P6"
          P5: "P5"
          P4: "P4"
          
          # --- COLS ---
          P10: "P10"
          P19: "P19"
          P9: "P9"
          P0: "P0"
          P14: "P14"
          P15: "P15"

          # --- THUMB COLS ---
          P16: "P16"
          P18: "P18"

          # --- ENCODERS ---
          P20: "P20"
          P101: "P101"
          P21: "P21"

          # --- DEVICES (This now works) ---
          # On Left (source): P1, P2, P3 connect to Display
          # On Right (clone): P1 is unused, P2, P3 connect to Trackpad
          P1: "P1"     
          P2: "P2"     
          P3: "P3"     
          P102: "P102" # Trackpad 'rdy' (right side only)

      oled: 
        what: ceoloide/display_nice_view
        where: /oled/
        params:
          side: F
          GND: "{{nets.gnd}}"
          VCC: "{{nets.vcc}}"
          MOSI: "{{nets.mosi}}"
          SCK: "{{nets.sck}}"
          CS: "{{nets.cs}}"

      battery_connectors:
        what: ceoloide/battery_connector_jst_ph_2
        where: /jst/
        params:
          side: B
          BAT_P: "{{nets.pos}}"
          BAT_N: "{{nets.neg}}"
          
      power_switch_left:
        what: ceoloide/power_switch_smd_side
        where: /power_l/
        params:
          reversible: true
          side: B
      
      power_switch_right:
        what: ceoloide/power_switch_smd_side
        where: /power_r/
        params:
          reversible: true
          side: B

      reset_buttons:
        what: ceoloide/reset_switch_smd_side
        where: /reset_button/
        
      encoders:
        what: ceoloide/rotary_encoder_ec11_ec12
        where: /encoder/

      switches:
        what: ceoloide/switch_choc_v1_v2
        where: /switch/
        params:
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"

      diodes:
        what: ceoloide/diode_tht_sod123
        where: /switch/
        params:
          reversible: true
          include_tht: true
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [2, -5]

      trackpad:
        what: ceoloide/mcu_supermini_nrf52840
        where: /trackpad/
        params:
          VCC: "{{nets.vcc}}"
          GND: "{{nets.gnd}}"
          P2: "{{nets.sda}}"
          P3: "{{nets.scl}}"
          P102: "{{nets.rdy}}"

      standoffs:
        what: ceoloide/mounting_hole_plated
        where: /hole/
        params:
          drill: 2.2
