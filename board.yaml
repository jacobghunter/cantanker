units:
  kx: cx
  ky: cy
  px: kx + 4
  py: ky + 4
points:
  mirror: &mirror
    ref: matrix_inner_num
    distance: 8kx
  zones:
    matrix:
      key:
        padding: 1ky
        spread: 1kx
      columns:
        outer:
          rows.mod.skip: true
          rows.num:
            asym: source
        pinky:
          key:
            stagger: 6
            splay: -5
          rows.mod.skip: true
        ring:
          key.splay: -3
          key.stagger: 7
          rows.mod.skip: true
        middle:
          key.stagger: 2.5
        index: 
          key.stagger: -2.5
        inner:
          rows.mod.skip: true
          key.stagger: -2.5
      rows:
        mod:
        bottom:
        home:
        top:
        num:
    thumbs:
      key:
        padding: 1ky
        spread: 1kx
      columns:
        layer:
          key:
            splay: -15
            shift: [0, -2]
        nav:
          key:
            splay: -35
            shift: [7.8, -4.8]
        space:
          key:
            width: 1.5kx
            splay: 65
            shift: [0,-14]
        
      anchor:
        ref: matrix_inner_mod
        shift: [2, -2]
      rows:
        cluster:

    # for pinky num key encoder
    right_encoder:
      anchor:
        ref: matrix_outer_num
      key:
        asym: clone
        padding: 1ky
        spread: 1kx
        footprint: Rotary

    # for left encoder
    left_encoder:
      anchor:
        ref: matrix_inner_bottom
      key:
        asym: source
        shift: [20, 5]
        padding: 1ky
        spread: 1kx
        footprint: Rotary

    mcu:
      anchor:
        ref: matrix_inner_num
        shift: [20, 0]
      key:
        footprint: nice!nano_v2
      
    power_sw:
      anchor:
        ref: mcu
        shift: [18, 0]
      key:
        footprint: Power_Switch_MSK12C02
    
    trackpad_socket:
      anchor:
        ref: matrix_inner_bottom
        shift: [20, 10]
      key:
        asym: clone
        footprint: PinSocket_1x05_P2.54mm_Vertical

outlines:
  raw: 
    - what: rectangle
      where: true
      size: [px, py]
      fillet: 3
  keys:
    - what: rectangle
      where: true
      size: [kx-0.5,ky-0.5]
  
