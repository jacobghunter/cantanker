  board:
    - what: polygon
      operation: stack
      fillet: 4
      points: 
        - ref: matrix_outer_num
          shift: [-0.5px,0.5py]
        - ref: matrix_pinky_num
          shift: [-0.5px,0.5py]
        - ref: matrix_ring_num
          shift: [-0.5px,0.5py]
        - ref: matrix_middle_num
          shift: [-0.5px,0.5py]
        - ref: matrix_middle_num
          shift: [0.5px,0.5py]
        - ref: matrix_index_num
          shift: [0.5px,0.5py]
        - ref: matrix_inner_num
          shift: [0.5px,0.5py]
        - ref: mcu
          shift: [0.5px,0.5py]
        - ref: power_sw
          shift: [0.5px,0.5py]
        - ref: power_sw
          shift: [0.5px,-0.5py]
        - ref: thumbs_space_cluster
          shift: [0.75px,-0.55py]
        - ref: thumbs_space_cluster
          shift: [-0.75px,-0.55py]
        - ref: thumbs_nav_cluster
          shift: [0,-0.5py]
        - ref: thumbs_layer_cluster
          shift: [0, -0.5py]
        - ref: matrix_index_mod
          shift: [-0.5px,-0.5py]
        - ref: matrix_middle_mod
          shift: [-0.5px,-0.5py]
        - ref: matrix_ring_bottom
          shift: [0,-1.2py]
        - ref: matrix_outer_bottom
          shift: [0.5px,-0.55py]
        - ref: matrix_outer_bottom
          shift: [-0.55px,-0.55py]
    - what: polygon
      operation: stack
      fillet: 4
      points: 
        - ref: mirror_right_encoder
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_pinky_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_ring_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_middle_num
          shift: [-0.5px,0.5py]
        - ref: mirror_matrix_middle_num
          shift: [0.5px,0.5py]
        - ref: mirror_matrix_index_num
          shift: [0.5px,0.5py]
        - ref: mirror_matrix_inner_num
          shift: [0.5px,0.5py]
        - ref: mirror_mcu
          shift: [0.5px,0.5py]
        - ref: mirror_power_sw
          shift: [0.5px,0.5py]
        - ref: mirror_power_sw
          shift: [0.5px,-0.5py]
        - ref: mirror_thumbs_space_cluster
          shift: [0.75px,-0.55py]
        - ref: mirror_thumbs_space_cluster
          shift: [-0.75px,-0.55py]
        - ref: mirror_thumbs_nav_cluster
          shift: [0,-0.5py]
        - ref: mirror_thumbs_layer_cluster
          shift: [0, -0.5py]
        - ref: mirror_matrix_index_mod
          shift: [-0.5px,-0.5py]
        - ref: mirror_matrix_middle_mod
          shift: [-0.5px,-0.5py]
        - ref: mirror_matrix_ring_bottom
          shift: [0,-1.2py]
        - ref: mirror_matrix_outer_bottom
          shift: [0.5px,-0.55py]
        - ref: mirror_matrix_outer_bottom
          shift: [-0.55px,-0.55py]

  combo:
    - name: board
    - operation: subtract
      name: keys

