name: Generate PCB Docs

on:
  push:
    paths:
      - 'kicad/**.kicad_pcb'
  workflow_dispatch:

jobs:
  kibot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board_name: [left_half, right_half]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: KiBot for ${{ matrix.board_name }}
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          board: 'kicad/${{ matrix.board_name }}.kicad_pcb'
          config: 'kicad/config.kibot.yaml'
          dir: 'Generated_Docs/${{ matrix.board_name }}'
          skip: all

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board_name }}-gerbers
          path: 'Generated_Docs/${{ matrix.board_name }}'

      - name: Commit Renders to Repo
        run: |
          mkdir -p docs/images
          cd Generated_Docs/${{ matrix.board_name }}/Renders/
          for file in *.png; do
            cp "$file" "../../../docs/images/${{ matrix.board_name }}-$file"
          done
          cd ../../../

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/images/*.png
          
          if git diff --staged --quiet; then
            echo "No changes to renders."
          else
            git commit -m "docs: update pcb renders for ${{ matrix.board_name }} [skip ci]"
            # Pull with rebase handles the matrix jobs finishing at similar times
            git pull --rebase origin main
            git push origin main
          fi 
